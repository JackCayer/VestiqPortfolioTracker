name: Generate Daily Portfolio Reports

on:
  schedule:
    - cron: '0 13 * * 1-5'   # 9:00 AM ET (UTC-4) pre-market
    - cron: '0 20 * * 1-5'   # 4:00 PM ET (UTC-4) market close
  workflow_dispatch:
    inputs:
      report_type:
        description: 'Report type'
        required: true
        default: 'premarket'
        type: choice
        options: [premarket, close]

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Determine report type
        id: type
        run: |
          HOUR=$(date -u +%H)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.report_type }}" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "13" ]; then
            echo "type=premarket" >> $GITHUB_OUTPUT
          else
            echo "type=close" >> $GITHUB_OUTPUT
          fi

      - name: Generate report via Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_URL: ${{ secrets.FIREBASE_URL }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
        run: |
          REPORT_TYPE="${{ steps.type.outputs.type }}"
          TODAY=$(date +%Y-%m-%d)
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          if [ "$REPORT_TYPE" = "premarket" ]; then
            PROMPT="You are a concise financial analyst. Write a pre-market portfolio briefing for today ($TODAY).

          Cover:
          ## Market Conditions
          - Overnight futures (S&P 500, TSX, Nasdaq)
          - Key overnight news affecting Canadian or US equities

          ## Macro Watch
          - Any Fed/BoC news, inflation data, or economic releases today
          - CAD/USD exchange rate outlook

          ## Sector Highlights
          - 2-3 sectors to watch today and why

          ## Key Risks Today
          - Top 1-2 risks for a Canadian equity/ETF portfolio today

          Keep it under 350 words. Be specific with numbers where possible. No fluff."
          else
            PROMPT="You are a concise financial analyst. Write an end-of-day portfolio wrap for $TODAY.

          Cover:
          ## Market Summary
          - How S&P 500, TSX, and Nasdaq closed today (approximate % moves)
          - Was it a risk-on or risk-off day?

          ## Key Movers
          - Top 2-3 sectors or themes that drove markets today

          ## Canadian Market Focus
          - TSX performance and any notable Canadian stock/ETF news today
          - CAD/USD move today

          ## Tomorrow's Watch
          - Key events or data releases tomorrow
          - One thing to watch overnight

          Keep it under 350 words. Be specific. No fluff."
          fi

          # Call Gemini API
          RESPONSE=$(curl -s -X POST \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{
              \"contents\": [{\"role\": \"user\", \"parts\": [{\"text\": $(echo "$PROMPT" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')}]}],
              \"generationConfig\": {\"maxOutputTokens\": 600, \"temperature\": 0.7}
            }")

          # Extract text from response
          REPORT_TEXT=$(echo "$RESPONSE" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          try:
              text = d['candidates'][0]['content']['parts'][0]['text']
              print(text)
          except Exception as e:
              print('Error generating report: ' + str(e))
              print('Raw response: ' + json.dumps(d)[:200])
          ")

          echo "Generated report ($REPORT_TYPE):"
          echo "$REPORT_TEXT" | head -5

          # Save to Firebase
          REPORT_KEY="${TODAY}-${REPORT_TYPE}"
          ESCAPED_TEXT=$(echo "$REPORT_TEXT" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')

          curl -s -X PATCH \
            "${FIREBASE_URL}/vestiq/reports/${REPORT_KEY}.json?auth=${FIREBASE_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{
              \"date\": \"${TODAY}\",
              \"type\": \"${REPORT_TYPE}\",
              \"content\": ${ESCAPED_TEXT},
              \"generatedAt\": \"${NOW}\",
              \"auto\": true,
              \"model\": \"gemini-2.0-flash\"
            }"

          echo "Report saved to Firebase under key: $REPORT_KEY"
